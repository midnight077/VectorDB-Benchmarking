# Default benchmark configuration

lane: A

dataset:
  # name: fashion-mnist-784-euclidean
  # path: data/fashion-mnist-784-euclidean.hdf5
  # metric: euclidean
  name: sift-128-euclidean
  path: data/sift-128-euclidean.hdf5
  metric: euclidean

# k values to compute recall@k for. One results row is written per k.
k_values: [5,10,20,50,100]

# n_warmup: 50
# n_repeats: 3

n_warmup: 10
n_repeats: 3

backends:
  - name: faiss_flat
    index_type: flat
    build_params: {}
    search_params: {}

  - name: faiss_hnsw
    index_type: hnsw
    build_params: {M: 16, ef_construction: 200}
    search_params: {ef_search: 200}

  # - name: hnsw_scalar
  #   index_type: hnsw
  #   build_params: {M: 16, ef_construction: 200}
  #   search_params: {ef_search: 200}

  # - name: hnsw_fast
  #   index_type: hnsw
  #   build_params: {M: 16, ef_construction: 200}
  #   search_params: {ef_search: 200}

results:
  backend: sqlite
  path: results/results.db
